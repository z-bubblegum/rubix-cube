<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubik's Cube Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--bg-0);
    }

    .landing-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .landing-header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--text-1);
      letter-spacing: -0.03em;
      margin: 0 0 0.5rem;
    }

    .landing-header h1 span {
      color: var(--accent);
    }

    .landing-header p {
      color: var(--text-3);
      font-size: 1rem;
      margin: 0;
    }

    .landing-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      max-width: 780px;
      width: 100%;
    }

    .landing-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-align: center;
      text-decoration: none;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }

    .landing-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, var(--accent-dim), transparent 70%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .landing-card:hover::before {
      opacity: 1;
    }

    .landing-card.active {
      cursor: pointer;
    }

    .landing-card.active:hover {
      border-color: var(--border-active);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--accent-dim);
    }

    .landing-card.disabled {
      opacity: 0.45;
      cursor: default;
    }

    .landing-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 800;
      position: relative;
      z-index: 1;
    }

    .landing-icon.f2l {
      background: rgba(105, 219, 124, 0.15);
      color: var(--green);
    }

    .landing-icon.oll {
      background: rgba(255, 212, 59, 0.15);
      color: var(--yellow);
    }

    .landing-icon.pll {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
    }

    .landing-card h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-1);
      margin: 0;
      position: relative;
      z-index: 1;
    }

    .landing-card p {
      font-size: 0.85rem;
      color: var(--text-3);
      margin: 0;
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }

    .landing-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.25em 0.7em;
      border-radius: 6px;
      position: relative;
      z-index: 1;
    }

    .landing-badge.ready {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
    }

    .landing-badge.soon {
      background: rgba(110, 118, 129, 0.15);
      color: var(--text-3);
    }

    @media (max-width: 640px) {
      .landing-grid {
        grid-template-columns: 1fr;
        max-width: 340px;
      }

      .landing-header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

<div class="landing">
  <div class="landing-header">
    <h1>Rubik's Cube <span>Trainer</span></h1>
    <p>Master CFOP method step by step</p>
  </div>

  <div class="landing-grid">
    <div class="landing-card disabled">
      <div class="landing-icon f2l">F2L</div>
      <h2>F2L</h2>
      <p>First Two Layers — intuitive pair insertion</p>
      <span class="landing-badge soon">Coming Soon</span>
    </div>

    <div class="landing-card disabled">
      <div class="landing-icon oll">OLL</div>
      <h2>OLL</h2>
      <p>Orientation of Last Layer — 57 algorithms</p>
      <span class="landing-badge soon">Coming Soon</span>
    </div>

    <a href="pll.html" class="landing-card active">
      <div class="landing-icon pll">PLL</div>
      <h2>PLL</h2>
      <p>Permutation of Last Layer — 21 algorithms</p>
      <span class="landing-badge ready">Ready</span>
    </a>
  </div>
</div>

</body>
</html>
